<!DOCTYPE html>

<html lang="uk"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Lingerie Shop 💕</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    body {
        min-height: 100vh;

        background: url('bg.jpg') no-repeat center center;
        background-size: cover;
        background-attachment: fixed;

        text-align: center;
        color: white;
        font-family: Arial, sans-serif;
    }

    .container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    /* 🔥 АВАТАР (ПРОКАЧАНИЙ) */
    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        margin: 0 auto;
        border: 4px solid pink;
    }

    .avatar img {
        width: 180%;
        height: 180%;
        object-fit: cover;
        transform: scale(1.2); /* 🔥 збільшує щоб не було пустот */
    }

    h1 {
        margin: 15px 0;
        font-size: 24px;
    }

    .link {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 14px;
        background: pink;
        color: black;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        transition: 0.3s;
    }

    .link:hover {
        background: hotpink;
        color: white;
        transform: scale(1.05);
    }

    /* 📱 МОБІЛКА */
    @media (max-width: 600px) {

        body {
            background-attachment: scroll;
        }

        .avatar {
            width: 180px;
            height: 180px;
        }

        .avatar img {
            transform: scale(1.25); /* ще більше на телефоні */
        }

        h1 {
            font-size: 28px;
        }

        .link {
            width: 90%;
            padding: 18px;
            font-size: 18px;
        }
    }
</style>

</head>

<body>

<div class="container">

<!-- АВАТАР -->
<div class="avatar">
    <img src="avatar.png" alt="avatar">
</div>
