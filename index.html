<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>My Shop</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Фон */
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            text-align: center;
            color: white;
        }

        .container {
            margin-top: 80px;
        }

        /* Аватарка */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid pink;
        }

        h1 {
            margin-top: 15px;
        }

        /* Кнопки */
        .link {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 12px;
            background: pink;
            color: black;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .link:hover {
            background: hotpink;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Аватарка -->
    <img src="avatar.png" alt="avatar" class="avatar">

    <!-- Назва -->
    <h1>My Lingerie Shop 💕</h1>

    <!-- Лінки -->
    <a href="#" class="link">TikTok</a>
    <a href="#" class="link">Telegram</a>
    <a href="#" class="link">Instagram</a>

</div>

</body>
</html>
